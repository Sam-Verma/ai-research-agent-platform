version: "3.9"

services:

  api:
    build: .
    container_name: ai_research_agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - postgres
      - redis
      - qdrant

    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: research_postgres
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: research_agent

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: research_redis
    restart: always

    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: research_qdrant
    restart: always

    ports:
      - "6333:6333"

    volumes:
      - qdrant_data:/qdrant/storage

  frontend:
    build: ./frontend
    container_name: research_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  qdrant_data: