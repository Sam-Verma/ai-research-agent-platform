version: "3.9"

services:

  api:
    build: .
    container_name: ai_research_agent

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - postgres
      - redis
      - qdrant

    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: research_postgres
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: research_agent

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: research_redis
    restart: always

    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: research_qdrant
    restart: always

    ports:
      - "6333:6333"

    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data: